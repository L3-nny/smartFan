START
  |
  ├── Initialize Parameters (threshold, runtime, sampling interval, etc.)
  ├── Create Simulator Objects (Sensor, Controller, Actuator, Logger)
  |
  └── LOOP until simulation ends
        |
        ├── Sensor generates new temperature
        |
        ├── Controller checks temperature
        |      ├── If temp >= threshold → Command = ON
        |      ├── If temp <= threshold - hysteresis → Command = OFF
        |      └── Else → Keep previous state
        |
        ├── Actuator receives command
        |      ├── Change state (ON/OFF, possibly delayed)
        |      └── Send confirmation of new state
        |
        ├── Logger records:
        |      - Timestamp
        |      - Temperature
        |      - Command issued
        |      - Fan response
        |
        └── Wait for next sampling interval
  |
  └── Generate summary report
END
